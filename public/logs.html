<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RxMonitor - System Logs & Stats</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="theme.js"></script>
</head>
<body>
  <div class="glass-bg"></div>

  <div class="container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">📋</span>
        <h1>RxMonitor System Info & Logs</h1>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="btn btn-secondary" style="padding: 10px; border-radius: 50%; width: 40px; height: 40px; justify-content: center;" title="Toggle Light/Dark Mode">
          <span class="icon">☀️</span>
        </button>
        <a href="/" class="btn btn-secondary">🏠 Back to Dashboard</a>
        <button id="btn-email-logs" class="btn btn-secondary">📧 Email CSV</button>
        <a href="/api/system-logs/download" target="_blank" class="btn btn-primary">📥 Download CSV</a>
      </div>
    </header>

    <!-- System Stats Panel -->
    <section class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
      <div class="stat-card">
        <div class="stat-info">
          <h3>Server Uptime</h3>
          <p id="stat-uptime" class="stat-val" style="font-size: 20px;">0s</p>
        </div>
        <div class="stat-icon bg-blue">⏱️</div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <h3>Database Size</h3>
          <p id="stat-dbsize" class="stat-val" style="font-size: 20px;">0 KB</p>
        </div>
        <div class="stat-icon bg-green">💾</div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <h3>Memory Usage</h3>
          <p id="stat-memory" class="stat-val" style="font-size: 20px;">0 MB</p>
        </div>
        <div class="stat-icon bg-red">🧠</div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <h3>Total Logs</h3>
          <p id="stat-logs-count" class="stat-val" style="font-size: 20px;">0</p>
        </div>
        <div class="stat-icon bg-blue">📊</div>
      </div>
    </section>

    <!-- Logs Card -->
    <main class="dashboard-main">
      <div class="card">
        <div class="card-header">
          <h2>All Checked Logs (Latest 100)</h2>
          <button id="btn-refresh-logs" class="btn btn-icon">🔄</button>
        </div>
        
        <div class="table-container" style="max-height: 500px;">
          <table class="logs-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Monitor Name</th>
                <th>Status</th>
                <th>Response Time</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody id="system-logs-tbody">
              <tr>
                <td colspan="5" style="text-align: center; color: var(--color-muted);">Loading logs...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script>
    const toastEl = document.getElementById('toast');

    function showToast(message, type = 'success') {
      toastEl.textContent = message;
      toastEl.className = `toast show toast-${type}`;
      setTimeout(() => {
        toastEl.classList.remove('show');
      }, 4000);
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/system-status');
        if (!res.ok) throw new Error('Failed to load system stats.');
        const stats = await res.json();

        // Calculate friendly uptime
        const up = stats.serverUptime;
        const h = Math.floor(up / 3600);
        const m = Math.floor((up % 3600) / 60);
        const s = up % 60;
        const uptimeStr = h > 0 ? `${h}h ${m}m ${s}s` : m > 0 ? `${m}m ${s}s` : `${s}s`;

        document.getElementById('stat-uptime').textContent = uptimeStr;
        document.getElementById('stat-dbsize').textContent = `${stats.dbSize} KB`;
        document.getElementById('stat-memory').textContent = `${stats.totalMemory - stats.freeMemory} / ${stats.totalMemory} MB`;
        document.getElementById('stat-logs-count').textContent = stats.logsCount;
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function loadLogs() {
      const tbody = document.getElementById('system-logs-tbody');
      try {
        const res = await fetch('/api/system-logs?limit=100');
        if (!res.ok) throw new Error('Failed to load logs list.');
        const logs = await res.json();

        if (logs.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--color-muted);">No logs recorded.</td></tr>`;
          return;
        }

        tbody.innerHTML = logs.map(l => {
          const timeStr = new Date(l.checked_at).toLocaleString();
          const statusSpan = l.status === 'UP' 
            ? `<span class="badge" style="background: var(--color-success-bg); color: var(--color-success); border-color: rgba(16, 185, 129, 0.2);">UP</span>`
            : l.status === 'PENDING'
            ? `<span class="badge" style="background: var(--color-warning-bg); color: var(--color-warning); border-color: rgba(245, 158, 11, 0.2);">RETRY</span>`
            : `<span class="badge" style="background: var(--color-error-bg); color: var(--color-error); border-color: rgba(239, 68, 68, 0.2);">DOWN</span>`;
          return `
            <tr>
              <td>${timeStr}</td>
              <td style="font-weight: 500;">${escapeHTML(l.monitor_name)}</td>
              <td>${statusSpan}</td>
              <td>${l.response_time} ms</td>
              <td><code>${escapeHTML(l.message || '')}</code></td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--color-error);">${err.message}</td></tr>`;
      }
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag] || tag)
      );
    }

    document.getElementById('btn-refresh-logs').addEventListener('click', () => {
      loadStats();
      loadLogs();
      showToast('Logs and stats refreshed!');
    });

    document.getElementById('btn-email-logs').addEventListener('click', async () => {
      const btn = document.getElementById('btn-email-logs');
      btn.disabled = true;
      btn.textContent = 'Mailing...';
      try {
        const res = await fetch('/api/system-logs/email', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          showToast('Latest 500 logs emailed to admin successfully!');
        } else {
          showToast(data.error || 'Failed to email logs', 'error');
        }
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '📧 Email CSV';
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadStats();
      loadLogs();
    });
  </script>
</body>
</html>
